services:
  # --- PostgreSQL database ---
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smart_bookmarks
    ports:
      - "5434:5432" # 5434 op je Mac, om botsing met andere lokale/Docker Postgres-instanties te voorkomen
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Dit bestand wordt automatisch uitgevoerd de EERSTE keer dat de
      # database-container met een lege volume start — zo staan de
      # tabellen er meteen, zonder dat je het handmatig moet doen.
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Backend (Express API) ---
  server:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db # de containernaam werkt als hostnaam binnen het Docker-netwerk
      DB_NAME: smart_bookmarks
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET:-dev_secret_verander_dit}
      JWT_EXPIRES_IN: 7d
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy

  # --- Frontend (React, geserveerd via nginx) ---
  client:
    build: ./client
    ports:
      - "5174:80" # http://localhost:5174 in de browser
    depends_on:
      - server

volumes:
  pgdata:
