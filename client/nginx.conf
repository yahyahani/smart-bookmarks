server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Alle routes terugleiden naar index.html, zodat een eventuele
    # client-side router (zoals React Router) ze zelf kan afhandelen.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
